name: Sync to Hugging Face hub
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true
      - name: Setup Git LFS
        run: |
          git lfs install
          git lfs track "*.pt"
          git add .gitattributes
      - name: Push to hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: git push --force https://mahraalh:$HF_TOKEN@huggingface.co/spaces/mahraalh/cola-pepsi-detection main